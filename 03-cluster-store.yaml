apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: project-shield-vault
spec:
  provider:
    kubernetes:
      remoteNamespace: project-shield-hub
      server:
        url: 'https://kubernetes.default.svc'
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: project-shield-hub
          key: ca.crt
      auth:
        serviceAccount:
          name: ai-secret-fetcher
          namespace: project-shield-hub
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-secret-reader
  namespace: project-shield-hub
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-secret-reader-binding
  namespace: project-shield-hub
subjects:
- kind: ServiceAccount
  name: ai-secret-fetcher
  namespace: project-shield-hub
roleRef:
  kind: Role
  name: ai-secret-reader
  apiGroup: rbac.authorization.k8s.io